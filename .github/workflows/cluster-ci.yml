name: Cluster-CI Execution

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute-on-cluster:
    name: Execute Research Pipeline
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GPU Hardware Validation
        run: |
          echo "🚀 Starting GPU healthcheck..."
          # Try running docker directly, fallback to sudo if permission denied
          if ! docker ps >/dev/null 2>&1; then
            DOCKER_CMD="sudo -n docker"
          else
            DOCKER_CMD="docker"
          fi
          $DOCKER_CMD run --rm --gpus all nvcr.io/nvidia/l4t-pytorch:r35.2.1-pth2.0-py3 \
            python3 -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}'); assert torch.cuda.is_available()"

      - name: Submit and Wait for Research Pipeline
        run: /usr/local/bin/cluster-ci-run "${{ github.repository }}" "${{ github.head_ref || github.ref_name }}" "${{ secrets.GITHUB_TOKEN }}"
