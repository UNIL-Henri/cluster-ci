<!DOCTYPE html>
<html>
<head>
    <title>Cluster-CI Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .explorer-item {
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            height: 100%;
        }
        .explorer-item:hover {
            background-color: #e9ecef;
        }
        .explorer-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .folder-icon { color: #ffca28; }
        .file-icon { color: #90a4ae; }
        .breadcrumb-item { cursor: pointer; color: #0d6efd; }
        .breadcrumb-item.active { cursor: default; color: #6c757d; }
        .status-badge {
            font-size: 0.8rem;
            padding: 0.3em 0.6em;
            border-radius: 10px;
        }
        #preview-content img {
            max-width: 100%;
            height: auto;
        }
        #preview-content pre {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            max-height: 500px;
            overflow-y: auto;
        }
        .table-preview {
            font-size: 0.85rem;
        }
        /* Override row-cols for full-width elements */
        .full-width {
            flex: 0 0 100% !important;
            max-width: 100% !important;
        }
        /* Log modal segmented view */
        .log-stage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 12px;
            background: #161616;
            border-bottom: 1px solid #333;
        }
        .log-stage-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-stage-btn i { font-size: 1rem; flex-shrink: 0; }
        .log-stage-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .log-stage-btn.active { box-shadow: 0 0 0 2px #fff, 0 0 8px rgba(255,255,255,0.3); transform: translateY(-1px); }
        /* Status colors */
        .log-stage-btn.status-success { background: #198754; color: #fff; border-color: #198754; }
        .log-stage-btn.status-warning { background: #ffc107; color: #212529; border-color: #ffc107; }
        .log-stage-btn.status-error { background: #dc3545; color: #fff; border-color: #dc3545; }
        .log-stage-btn.status-neutral { background: #2a2a2a; color: #adb5bd; border-color: #444; }
        .log-stage-btn.status-running { background: #0d6efd; color: #fff; border-color: #0d6efd; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 4px rgba(13,110,253,0.4); }
            50% { box-shadow: 0 0 12px rgba(13,110,253,0.8); }
        }
        .log-section-content {
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            color: #d4d4d4;
            font-size: 0.9rem;
            padding: 16px;
            margin: 0;
            min-height: 300px;
        }
        .btn-copy-logs {
            transition: all 0.2s ease;
        }
        .btn-copy-logs.copied {
            background-color: #198754 !important;
            border-color: #198754 !important;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Cluster-CI</a>
            <div class="navbar-text text-light">
                Logged in as <strong>{{ user.login }}</strong>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm ms-3">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-white p-3 rounded shadow-sm" id="breadcrumb">
                <li class="breadcrumb-item active" id="breadcrumb-home" onclick="navigateToRoot()">Home</li>
            </ol>
        </nav>

        <div id="cluster-stats-container"></div>

        <div id="explorer-container" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Content will be loaded here via JS -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header d-flex flex-column align-items-start">
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <h5 class="modal-title text-truncate" id="previewModalLabel" style="max-width: 80%;">File Preview</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div id="preview-version-nav" class="w-100 mt-3 d-none"></div>
                </div>
                <div class="modal-body">
                    <div id="preview-loading" class="text-center py-5 d-none">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="preview-content"></div>
                </div>
                <div class="modal-footer">
                    <a id="preview-download-btn" href="#" class="btn btn-primary" target="_blank">Download</a>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Modal (Segmented by pipeline stage) -->
    <div class="modal fade" id="logModal" tabindex="-1" aria-labelledby="logModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="logModalLabel"><i class="bi bi-terminal"></i> Execution Logs</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div id="log-stage-grid" class="log-stage-grid">
                    <!-- Stage buttons rendered dynamically -->
                </div>
                <div class="modal-body p-0" style="background-color: #1e1e1e;">
                    <pre id="log-content" class="log-section-content"></pre>
                </div>
                <div class="modal-footer border-secondary d-flex justify-content-between align-items-center">
                    <button type="button" class="btn btn-outline-light btn-sm btn-copy-logs" onclick="copyLogs()">
                        <i class="bi bi-clipboard"></i> Copy
                    </button>
                    <span id="log-line-indicator" class="text-muted small"></span>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));
        const previewContent = document.getElementById('preview-content');
        const previewLoading = document.getElementById('preview-loading');
        const previewLabel = document.getElementById('previewModalLabel');
        const previewDownloadBtn = document.getElementById('preview-download-btn');

        const MAX_PREVIEW_SIZE = 10 * 1024 * 1024; // 10MB

        function navigateToVersion(jobId, path) {
            const run = window.allRuns.find(r => r.job_id === jobId);
            if (!run) return;
            
            currentState.jobId = run.job_id;
            currentState.branch = run.branch;
            currentState.commitHash = run.commit_hash;
            currentState.createdAt = run.created_at;
            updateBreadcrumb();
            
            const [owner, name] = currentState.repo.split('/');
            const rev = run.commit_hash || run.branch || 'main';
            const downloadUrl = `/artifacts/${owner}/${name}/${rev}/${encodeURIComponent(path)}`;
            previewFile(downloadUrl, path, 0);
        }

        async function previewFile(url, path, size) {
            previewLabel.textContent = `Preview: ${path}`;
            previewDownloadBtn.href = url;
            previewContent.innerHTML = '';
            const navContainer = document.getElementById('preview-version-nav');
            
            if (window.allRuns && window.allRuns.length > 0) {
                const currentIndex = window.allRuns.findIndex(r => r.job_id === currentState.jobId);
                if (currentIndex >= 0) {
                    const currentRun = window.allRuns[currentIndex];
                    let prevHtml = '';
                    if (currentIndex < window.allRuns.length - 1) {
                        const prevRun = window.allRuns[currentIndex + 1];
                        const prevDate = new Date(prevRun.created_at).toLocaleString('en-US', {
                            year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                        }).replace(',', '');
                        const prevTitle = prevRun.commit_title ? escapeHtml(prevRun.commit_title) : prevRun.job_id.substring(0,8);
                        prevHtml = `<button class="btn btn-outline-secondary btn-sm" onclick="navigateToVersion('${prevRun.job_id}', '${escapeHtml(path).replace(/'/g, "\\'")}')" title="${prevTitle}">
                            <i class="bi bi-chevron-left"></i> Version from ${prevDate}
                        </button>`;
                    } else {
                        prevHtml = `<button class="btn btn-outline-secondary btn-sm disabled"><i class="bi bi-chevron-left"></i> Older</button>`;
                    }

                    let nextHtml = '';
                    if (currentIndex > 0) {
                        const nextRun = window.allRuns[currentIndex - 1];
                        const nextDate = new Date(nextRun.created_at).toLocaleString('en-US', {
                            year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                        }).replace(',', '');
                        const nextTitle = nextRun.commit_title ? escapeHtml(nextRun.commit_title) : nextRun.job_id.substring(0,8);
                        nextHtml = `<button class="btn btn-outline-secondary btn-sm" onclick="navigateToVersion('${nextRun.job_id}', '${escapeHtml(path).replace(/'/g, "\\'")}')" title="${nextTitle}">
                            Version from ${nextDate} <i class="bi bi-chevron-right"></i>
                        </button>`;
                    } else {
                        nextHtml = `<button class="btn btn-outline-secondary btn-sm disabled">Newer <i class="bi bi-chevron-right"></i></button>`;
                    }

                    const currentTitle = currentRun.commit_title ? escapeHtml(currentRun.commit_title) : currentRun.job_id.substring(0,8);
                    
                    navContainer.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center bg-light p-2 rounded border w-100">
                            ${prevHtml}
                            <div class="text-center mx-2 text-truncate" style="max-width: 45%;" title="${currentTitle}">
                                <small class="text-muted d-block" style="font-size: 0.75rem;">Associated Commit</small>
                                <strong>${currentTitle}</strong>
                            </div>
                            ${nextHtml}
                        </div>
                    `;

                    navContainer.classList.remove('d-none');
                } else {
                    navContainer.classList.add('d-none');
                }
            } else {
                navContainer.classList.add('d-none');
            }

            const ext = path.split('.').pop().toLowerCase();
            const isImage = ['png', 'jpg', 'jpeg', 'svg', 'webp'].includes(ext);
            const isCSV = ext === 'csv';
            const isText = ['json', 'yaml', 'yml', 'txt', 'log', 'md'].includes(ext);

            if (!isImage && !isCSV && !isText) {
                previewContent.innerHTML = `<div class="alert alert-warning">Preview not supported for this file type (.${ext}). Please download the file to view it.</div>`;
                previewModal.show();
                return;
            }

            if (size > MAX_PREVIEW_SIZE) {
                previewContent.innerHTML = `<div class="alert alert-warning">File is too large to preview (${(size / (1024 * 1024)).toFixed(1)} MB). Please download the file to view it.</div>`;
                previewModal.show();
                return;
            }

            previewLoading.classList.remove('d-none');
            previewModal.show();

            try {
                if (isImage) {
                    const viewUrl = url + (url.includes('?') ? '&' : '?') + 'inline=true';
                    previewContent.innerHTML = `<div class="text-center"><img src="${viewUrl}" alt="${escapeHtml(path)}"></div>`;
                } else if (isCSV) {
                    const resp = await fetch(url);
                    const text = await resp.text();
                    renderCSV(text);
                } else if (isText) {
                    const resp = await fetch(url);
                    const text = await resp.text();
                    const lines = text.split('\n');
                    let displayText = text;
                    let truncationNotice = '';
                    if (lines.length > 100) {
                        displayText = lines.slice(0, 100).join('\n');
                        truncationNotice = '<div class="text-muted small mt-2 text-center">Showing first 100 lines. Download the file for full content.</div>';
                    }
                    previewContent.innerHTML = `<pre><code>${escapeHtml(displayText)}</code></pre>${truncationNotice}`;
                }
            } catch (err) {
                previewContent.innerHTML = `<div class="alert alert-danger">Error loading preview: ${err.message}</div>`;
            } finally {
                previewLoading.classList.add('d-none');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function parseCSV(text, limit = 101) {
            const result = [];
            let row = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        cell += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        cell += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(cell);
                        cell = '';
                    } else if (char === '\n' || char === '\r') {
                        row.push(cell);
                        result.push(row);
                        row = [];
                        cell = '';
                        if (char === '\r' && nextChar === '\n') i++;
                        if (result.length >= limit) return result;
                    } else {
                        cell += char;
                    }
                }
            }

            if (row.length > 0 || cell !== '') {
                row.push(cell);
                result.push(row);
            }

            return result;
        }

        function renderCSV(text) {
            const rows = parseCSV(text, 101);
            if (rows.length === 0) {
                previewContent.innerHTML = '<div class="alert alert-info">CSV file is empty.</div>';
                return;
            }

            let html = '<div class="table-responsive"><table class="table table-sm table-bordered table-striped table-preview"><thead><tr>';
            const headers = rows[0];
            headers.forEach(h => {
                html += `<th>${escapeHtml(h)}</th>`;
            });
            html += '</tr></thead><tbody>';

            for (let i = 1; i < rows.length; i++) {
                html += '<tr>';
                const cells = rows[i];
                cells.forEach(c => {
                    html += `<td>${escapeHtml(c || '')}</td>`;
                });
                html += '</tr>';
            }

            html += '</tbody></table></div>';
            if (rows.length > 100) {
                html += '<div class="text-muted small mt-2 text-center">Showing first 100 rows. Download the file for full content.</div>';
            }
            previewContent.innerHTML = html;
        }


        const container = document.getElementById('explorer-container');
        const breadcrumb = document.getElementById('breadcrumb');

        let currentState = {
            view: 'root', // root, project, run
            repo: null,
            jobId: null,
            branch: null,
            commitHash: null,
            createdAt: null,
            subPath: '' // Current subfolder path within a run
        };

        function updateBreadcrumb() {
            breadcrumb.innerHTML = '';

            const homeLi = document.createElement('li');
            homeLi.className = 'breadcrumb-item ' + (currentState.view === 'root' ? 'active' : '');
            homeLi.textContent = 'Home';
            homeLi.onclick = navigateToRoot;
            breadcrumb.appendChild(homeLi);

            if (currentState.repo) {
                const projectLi = document.createElement('li');
                projectLi.className = 'breadcrumb-item ' + (currentState.view === 'project' ? 'active' : '');
                projectLi.textContent = currentState.repo;
                const repo = currentState.repo;
                projectLi.onclick = () => navigateToProject(repo);
                breadcrumb.appendChild(projectLi);
            }

            if (currentState.jobId) {
                const runLi = document.createElement('li');
                runLi.className = 'breadcrumb-item ' + (currentState.subPath ? '' : 'active');
                if (currentState.createdAt) {
                    const runDate = new Date(currentState.createdAt);
                    runLi.textContent = runDate.toLocaleString('en-US', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    }).replace(',', '');
                } else {
                    runLi.textContent = currentState.jobId.substring(0, 8) + '...';
                }
                // If we have a subPath, clicking the run breadcrumb navigates back to root of run
                if (currentState.subPath) {
                    runLi.onclick = () => navigateToSubPath('');
                }
                breadcrumb.appendChild(runLi);
            }

            // Render sub-path breadcrumb segments
            if (currentState.subPath) {
                const parts = currentState.subPath.split('/').filter(p => p);
                parts.forEach((part, idx) => {
                    const li = document.createElement('li');
                    const isLast = idx === parts.length - 1;
                    li.className = 'breadcrumb-item ' + (isLast ? 'active' : '');
                    li.textContent = part;
                    if (!isLast) {
                        const targetPath = parts.slice(0, idx + 1).join('/');
                        li.onclick = () => navigateToSubPath(targetPath);
                    }
                    breadcrumb.appendChild(li);
                });
            }
        }

        async function loadProjects() {
            currentState = { view: 'root', repo: null, jobId: null };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';
            
            // Only show cluster stats on the root view
            const statsContainer = document.getElementById('cluster-stats-container');
            if (statsContainer) statsContainer.innerHTML = '';
            loadClusterStats();

            try {
                const resp = await fetch('/api/projects');
                const activeResp = await fetch('/api/runs/active');
                
                if (!resp.ok || !activeResp.ok) {
                    throw new Error('Failed to load dashboard data');
                }
                const projects = await resp.json();
                const activeRuns = await activeResp.json();

                container.innerHTML = '';
                
                if (activeRuns.length > 0) {
                    const runningHeader = document.createElement('div');
                    runningHeader.className = 'col-12 full-width mb-3 mt-2';
                    runningHeader.innerHTML = '<h4 class="text-primary"><i class="bi bi-activity"></i> Active Cluster Runs</h4>';
                    container.appendChild(runningHeader);

                    activeRuns.forEach(run => {
                        const col = document.createElement('div');
                        col.className = 'col-12 full-width mb-4';
                        const [owner, name] = run.repo.split('/');
                        const viewerUrl = '/view/' + encodeURIComponent(owner) + '/' + encodeURIComponent(name) + '/';
                        
                        const runDate = new Date(run.created_at).toLocaleString('en-US', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit', second: '2-digit'
                        }).replace(',', '');

                        col.innerHTML = `
                            <div class="card shadow-sm border-primary" style="background-color: #f8fbff;">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div class="d-flex align-items-center cursor-pointer" onclick="navigateToProject('${run.repo}')" style="cursor: pointer;">
                                        <div class="me-3">
                                            <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
                                        </div>
                                        <div>
                                            <h5 class="card-title text-primary mb-1">
                                                ${escapeHtml(run.repo)}
                                            </h5>
                                            <p class="card-text text-muted mb-0">
                                                Branch: <strong>${escapeHtml(run.branch)}</strong> | Job ID: ${run.job_id.substring(0,8)}... | ${runDate}
                                            </p>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-outline-primary" onclick="showLogs('${run.job_id}')">
                                            <i class="bi bi-terminal"></i> View Logs
                                        </button>
                                        <a href="${viewerUrl}" class="btn btn-primary" target="_blank">
                                            <i class="bi bi-broadcast"></i> Open Live DVC-Viewer
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(col);
                    });
                    
                    const divider = document.createElement('div');
                    divider.className = 'col-12 full-width mt-4 mb-3';
                    divider.innerHTML = '<h4 class="text-secondary"><i class="bi bi-folder2-open"></i> Projects</h4><hr>';
                    container.appendChild(divider);
                }

                if (projects.length === 0) {
                    container.innerHTML += '<div class="col-12"><div class="alert alert-info">No projects found.</div></div>';
                    return;
                }

                projects.forEach(repo => {
                    const col = document.createElement('div');
                    col.className = 'col';

                    const card = document.createElement('div');
                    card.className = 'card h-100 explorer-item shadow-sm';
                    card.onclick = () => navigateToProject(repo);

                    const icon = document.createElement('i');
                    icon.className = 'bi bi-folder-fill explorer-icon folder-icon';

                    const title = document.createElement('h6');
                    title.className = 'card-title text-truncate';
                    title.textContent = repo;
                    title.title = repo;

                    card.appendChild(icon);
                    card.appendChild(title);
                    col.appendChild(card);

                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading dashboard: ${err.message}</div></div>`;
            }
        }

        async function loadRuns(repo) {
            currentState = { view: 'project', repo: repo, jobId: null };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';
            document.getElementById('cluster-stats-container').innerHTML = '';

            try {
                const resp = await fetch(`/api/projects/${repo}/runs`);
                if (!resp.ok) {
                    const contentType = resp.headers.get('content-type');
                    let error = 'Internal Server Error'; try { if (contentType && contentType.includes('application/json')) { const data = await resp.json(); error = data.error || data.message || error; } else { error = 'Server returned ' + resp.status + ' (' + resp.statusText + ')'; } } catch(e) { console.error('Error parsing failure response:', e); error = 'Parse Error: ' + e.message; }
                    throw new Error(error || 'Failed to load runs');
                }
                const runs = await resp.json();
                window.allRuns = runs;

                if (runs.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">No runs found for this project.</div></div>';
                    return;
                }

                container.innerHTML = '';

                const runningRuns = runs.filter(r => r.status === 'running');
                const otherRuns = runs.filter(r => r.status !== 'running');

                if (runningRuns.length > 0) {
                    const runningHeader = document.createElement('div');
                    runningHeader.className = 'col-12 full-width mb-3';
                    runningHeader.innerHTML = '<h4 class="text-primary"><i class="bi bi-activity"></i> Currently Running</h4>';
                    container.appendChild(runningHeader);

                    runningRuns.forEach(run => {
                        const col = document.createElement('div');
                        col.className = 'col-12 full-width mb-4';
                        const [owner, name] = repo.split('/');
                        const viewerUrl = '/view/' + encodeURIComponent(owner) + '/' + encodeURIComponent(name) + '/';
                        
                        const runDate = new Date(run.created_at).toLocaleString('en-US', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit', second: '2-digit'
                        }).replace(',', '');

                        col.innerHTML = `
                            <div class="card shadow-sm border-primary" style="background-color: #f8fbff;">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="card-title text-primary mb-1">

        async function loadRunDetails(jobId, status, repo, branch, commitHash, createdAt, subPath = '') {
            currentState = { view: 'run', repo: repo, jobId: jobId, branch: branch, commitHash: commitHash, createdAt: createdAt, subPath: subPath };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';

            if (!commitHash && status !== 'running') {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="card shadow-sm p-5 border-warning">
                            <h3><i class="bi bi-exclamation-triangle text-warning"></i> Run Details Unavailable</h3>
                            <p class="text-muted">This run does not have an associated commit hash. It may have failed to start or was interrupted before committing its state.</p>
                        </div>
                    </div>
                `;
                return;
            }

            if (status === 'running') {
                const [owner, name] = repo.split('/');
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="card shadow-sm p-5">
                            <h3>Run is currently in progress</h3>
                            <p class="text-muted">Files are being processed and are not yet pushed to the headnode.</p>
                            <a href="/view/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/" class="btn btn-primary btn-lg mt-3">
                                <i class="bi bi-broadcast"></i> Open Live DVC-Viewer
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            try {
                const filesUrl = `/api/runs/${jobId}/files` + (subPath ? `?path=${encodeURIComponent(subPath)}` : '');
                const resp = await fetch(filesUrl);
                if (!resp.ok) {
                    const contentType = resp.headers.get('content-type');
                    let error = 'Internal Server Error'; try { if (contentType && contentType.includes('application/json')) { const data = await resp.json(); error = data.error || data.message || error; } else { error = 'Server returned ' + resp.status + ' (' + resp.statusText + ')'; } } catch(e) { console.error('Error parsing failure response:', e); error = 'Parse Error: ' + e.message; }
                    throw new Error(error || 'Failed to load files');
                }
                const files = await resp.json();

                if (files.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">No files found for this run.</div></div>';
                    return;
                }

                container.innerHTML = '';
                // Render files/dirs
                files.forEach(item => {
                    const col = document.createElement('div');
                    col.className = 'col';

                    // Use DVC's native 'isdir' field from JSON output
                    const isDir = item.isdir === true;
                    const iconClass = isDir ? 'bi-folder-fill folder-icon' : 'bi-file-earmark-text-fill file-icon';

                    // Construct download link using commit hash if available for consistency
                    const [owner, name] = repo.split('/');
                    const rev = currentState.commitHash || currentState.branch || 'main';
                    // Build full path for subfolder-aware download URL
                    const fullFilePath = subPath ? subPath + '/' + item.path.replace(/\/$/, '') : item.path.replace(/\/$/, '');
                    const downloadUrl = `/artifacts/${owner}/${name}/${rev}/${encodeURIComponent(fullFilePath)}`;

                    const card = document.createElement('div');
                    card.className = 'card h-100 explorer-item shadow-sm';
                    if (isDir) {
                        const dirPath = subPath ? subPath + '/' + item.path.replace(/\/$/, '') : item.path.replace(/\/$/, '');
                        card.onclick = () => navigateToSubPath(dirPath);
                    } else {
                        card.onclick = () => previewFile(downloadUrl, fullFilePath, item.size || 0);
                    }

                    const icon = document.createElement('i');
                    icon.className = 'bi ' + iconClass + ' explorer-icon';

                    const title = document.createElement('h6');
                    title.className = 'card-title text-truncate';
                    title.textContent = item.path;
                    title.title = item.path;

                    const info = document.createElement('small');
                    info.className = 'text-muted';
                    info.textContent = item.size ? (item.size / 1024).toFixed(1) + ' KB' : (isDir ? 'Directory' : 'Tracked File');

                    card.appendChild(icon);
                    card.appendChild(title);
                    card.appendChild(info);
                    col.appendChild(card);

                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading run details: ${err.message}</div></div>`;
            }
        }

        // ── Log Segmentation Engine ──────────────────────────────────────
        let logPollingInterval = null;
        let lastLogOffset = 0;
        let fullLogBuffer = '';
        let currentSelectedStage = null;

        // Lazy rendering state
        const LOG_CHUNK_SIZE = 300; // lines per chunk
        let currentSectionLines = []; // full lines array for active section
        let renderedLineCount = 0;

        const STAGE_META = {
            setup:     { label: 'Setup',           icon: 'bi-gear-fill' },
            dvc_repro: { label: 'DVC Pipeline',    icon: 'bi-play-circle-fill' },
            sync:      { label: 'Sync & GC',       icon: 'bi-cloud-upload-fill' },
        };

        const ERROR_PATTERNS   = /\berror\b|❌|\bfailed\b|\bFATAL\b|\bTraceback\b|\bException\b|Error:|exit code [1-9]/i;
        const WARNING_PATTERNS = /\bwarning\b|⚠️|\bWARN\b|\bdeprecated\b/i;
        const SUCCESS_PATTERNS = /✅|\bcompleted successfully\b|\bsuccess\b/i;
        const KILL_PATTERNS = [
            { pattern: /Exit code 137|OOM|Out of Memory/i, reason: 'OOM Kill' },
            { pattern: /CLUSTER INTERRUPTED/i, reason: 'Interrupted' },
            { pattern: /zombie/i, reason: 'Zombie cleanup' },
            { pattern: /cancel/i, reason: 'Cancelled' },
            { pattern: /SIGTERM|SIGKILL|signal/i, reason: 'Killed' },
            { pattern: /didn.t change, skipping/i, reason: null }, // Not a kill
        ];

        function classifySection(content, isInProgress) {
            if (isInProgress) return 'running';
            if (ERROR_PATTERNS.test(content)) return 'error';
            if (WARNING_PATTERNS.test(content)) return 'warning';
            if (SUCCESS_PATTERNS.test(content)) return 'success';
            return 'neutral';
        }

        function getKillReason(content) {
            for (const { pattern, reason } of KILL_PATTERNS) {
                if (reason && pattern.test(content)) return reason;
            }
            return null;
        }

        function parseLogSections(rawText) {
            const sections = [];
            const stageRegex = /===STAGE:(\w+):(BEGIN|END)===/g;
            let matches = [];
            let match;
            while ((match = stageRegex.exec(rawText)) !== null) {
                matches.push({ name: match[1], type: match[2], index: match.index, fullMatch: match[0] });
            }

            if (matches.length === 0) {
                // Fallback: no markers found (legacy logs)
                sections.push({
                    id: 'full_log',
                    label: 'Full Log',
                    icon: 'bi-file-text-fill',
                    content: rawText,
                    status: classifySection(rawText)
                });
                return sections;
            }

            // Content before first marker
            const preamble = rawText.substring(0, matches[0].index).trim();
            if (preamble) {
                sections.push({
                    id: 'preamble',
                    label: 'Init',
                    icon: 'bi-rocket-takeoff-fill',
                    content: preamble,
                    status: classifySection(preamble, false)
                });
            }

            // Parse BEGIN/END pairs
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i];
                if (m.type !== 'BEGIN') continue;

                // Find matching END
                const endMatch = matches.find((e, j) => j > i && e.name === m.name && e.type === 'END');
                const isInProgress = !endMatch;
                const contentStart = m.index + m.fullMatch.length;
                const contentEnd = endMatch ? endMatch.index : rawText.length;
                const stageContent = rawText.substring(contentStart, contentEnd).trim();

                const meta = STAGE_META[m.name] || { label: m.name, icon: 'bi-circle' };

                if (m.name === 'dvc_repro') {
                    // Parse DVC sub-stages from the pipeline output
                    const subStages = parseDvcSubStages(stageContent, isInProgress);
                    if (subStages.length > 1) {
                        subStages.forEach(sub => sections.push(sub));
                    } else {
                        sections.push({
                            id: m.name,
                            label: meta.label,
                            icon: meta.icon,
                            content: stageContent,
                            status: classifySection(stageContent, isInProgress)
                        });
                    }
                } else {
                    sections.push({
                        id: m.name,
                        label: meta.label,
                        icon: meta.icon,
                        content: stageContent,
                        status: classifySection(stageContent, isInProgress)
                    });
                }
            }

            // Content after last marker — only if last marker is an END (not mid-stage)
            const lastMatch = matches[matches.length - 1];
            if (lastMatch.type === 'END') {
                const epilogue = rawText.substring(lastMatch.index + lastMatch.fullMatch.length).trim();
                if (epilogue) {
                    // Check for kill patterns in the epilogue
                    const killReason = getKillReason(epilogue);
                    // Only say Post-Run if the last marker was sync:END (i.e. truly finished)
                    const isTrulyFinished = (lastMatch.name === 'sync' || lastMatch.name === 'teardown');
                    const defaultLabel = isTrulyFinished ? 'Post-Run' : 'System';
                    
                    sections.push({
                        id: 'epilogue',
                        label: killReason ? `☠️ ${killReason}` : defaultLabel,
                        icon: killReason ? 'bi-x-octagon-fill' : 'bi-terminal',
                        content: epilogue,
                        status: classifySection(epilogue, !isTrulyFinished)
                    });
                }
            }

            return sections;
        }

        function parseDvcSubStages(dvcContent, parentIsInProgress) {
            // DVC outputs lines like: Running stage 'step_xxx':
            const stagePattern = /Running stage '([^']+)':/g;
            const stageMatches = [];
            let m;
            while ((m = stagePattern.exec(dvcContent)) !== null) {
                stageMatches.push({ name: m[1], index: m.index });
            }

            if (stageMatches.length === 0) return [{
                id: 'dvc_repro',
                label: 'DVC Pipeline',
                icon: 'bi-play-circle-fill',
                content: dvcContent,
                status: classifySection(dvcContent, parentIsInProgress)
            }];

            const sections = [];

            // Content before first DVC stage (dep install etc.)
            const preStage = dvcContent.substring(0, stageMatches[0].index).trim();
            if (preStage) {
                sections.push({
                    id: 'dvc_pre',
                    label: 'Deps Install',
                    icon: 'bi-download',
                    content: preStage,
                    status: classifySection(preStage, false)
                });
            }

            for (let i = 0; i < stageMatches.length; i++) {
                const isLastSubStage = (i === stageMatches.length - 1);
                const subStageInProgress = parentIsInProgress && isLastSubStage;
                const start = stageMatches[i].index;
                const end = i + 1 < stageMatches.length ? stageMatches[i + 1].index : dvcContent.length;
                const content = dvcContent.substring(start, end).trim();
                const stageName = stageMatches[i].name;

                // Prettify label: step_format -> Format, step_train -> Train, etc.
                let prettyLabel = stageName;
                if (stageName.startsWith('step_')) {
                    prettyLabel = stageName.replace('step_', '').replace(/_/g, ' ');
                    prettyLabel = prettyLabel.charAt(0).toUpperCase() + prettyLabel.slice(1);
                }

                sections.push({
                    id: 'dvc_' + stageName,
                    label: prettyLabel,
                    icon: 'bi-play-circle',
                    content: content,
                    status: classifySection(content, subStageInProgress)
                });
            }

            return sections;
        }

        function renderLogStageGrid(sections) {
            const grid = document.getElementById('log-stage-grid');
            grid.innerHTML = '';

            // Add "All" button
            const allBtn = document.createElement('button');
            allBtn.className = `log-stage-btn status-neutral ${currentSelectedStage === '__all__' ? 'active' : ''}`;
            allBtn.innerHTML = `<i class="bi bi-file-text-fill"></i> Raw Log`;
            allBtn.onclick = (e) => selectStage('__all__', sections, e);
            grid.appendChild(allBtn);

            sections.forEach(section => {
                const btn = document.createElement('button');
                const isActive = currentSelectedStage === section.id;
                btn.className = `log-stage-btn status-${section.status} ${isActive ? 'active' : ''}`;
                btn.innerHTML = `<i class="bi ${section.icon}"></i> ${escapeHtml(section.label)}`;
                btn.title = section.label;
                btn.onclick = (e) => selectStage(section.id, sections, e);
                grid.appendChild(btn);
            });

            // Add "Last Error" button if any section has error status
            const hasError = sections.some(s => s.status === 'error');
            if (hasError) {
                const errBtn = document.createElement('button');
                const isActive = currentSelectedStage === '__last_error__';
                errBtn.className = `log-stage-btn status-error ${isActive ? 'active' : ''}`;
                errBtn.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> Last Error`;
                errBtn.title = 'Show the last 100 lines of the full log';
                errBtn.onclick = (e) => selectStage('__last_error__', sections, e);
                grid.appendChild(errBtn);
            }
        }

        function isUserAtBottom() {
            const modalBody = document.querySelector('#logModal .modal-body');
            if (!modalBody) return true;
            // Consider "at bottom" if within 50px of the end
            return (modalBody.scrollHeight - modalBody.scrollTop - modalBody.clientHeight) < 50;
        }

        function selectStage(stageId, sections, evt) {
            currentSelectedStage = stageId;
            const content = getStageContent(stageId, sections);
            renderLogContent(content, true);

            // Update active button state
            document.querySelectorAll('.log-stage-btn').forEach(btn => btn.classList.remove('active'));
            if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');

            // Scroll to top on explicit user click (they chose a new section)
            const modalBody = document.querySelector('#logModal .modal-body');
            modalBody.scrollTop = 0;
        }

        function getStageContent(stageId, sections) {
            if (stageId === '__all__') return fullLogBuffer;
            if (stageId === '__last_error__') {
                return fullLogBuffer.split('\n').slice(-100).join('\n');
            }
            const section = sections ? sections.find(s => s.id === stageId) : null;
            return section ? section.content : '';
        }

        function renderLogContent(content, reset) {
            currentSectionLines = content.split('\n');
            const logContent = document.getElementById('log-content');

            if (reset) {
                renderedLineCount = 0;
            }

            if (currentSectionLines.length <= LOG_CHUNK_SIZE) {
                // Small content: render everything at once
                logContent.textContent = content;
                renderedLineCount = currentSectionLines.length;
            } else {
                // Large content: render first chunk only
                const end = Math.min(renderedLineCount + LOG_CHUNK_SIZE, currentSectionLines.length);
                logContent.textContent = currentSectionLines.slice(0, end).join('\n');
                renderedLineCount = end;
            }

            updateLineIndicator();
        }

        function loadMoreLogLines() {
            if (renderedLineCount >= currentSectionLines.length) return;

            const logContent = document.getElementById('log-content');
            const end = Math.min(renderedLineCount + LOG_CHUNK_SIZE, currentSectionLines.length);
            const nextChunk = currentSectionLines.slice(renderedLineCount, end);
            logContent.textContent += '\n' + nextChunk.join('\n');
            renderedLineCount = end;

            updateLineIndicator();
        }

        function updateLineIndicator() {
            const indicator = document.getElementById('log-line-indicator');
            if (!indicator) return;
            const total = currentSectionLines.length;
            if (renderedLineCount >= total) {
                indicator.textContent = `${total} lines`;
            } else {
                indicator.textContent = `${renderedLineCount} / ${total} lines ↓`;
            }
        }

        function copyLogs() {
            // Always copy the FULL section content, not just the rendered portion
            const text = currentSectionLines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy-logs');
                btn.classList.add('copied');
                btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
                }, 2000);
            });
        }

        function showLogs(jobId) {
            const logModal = new bootstrap.Modal(document.getElementById('logModal'));
            const logContent = document.getElementById('log-content');
            logContent.textContent = 'Connecting to worker for logs...';
            document.getElementById('log-stage-grid').innerHTML = '';
            document.getElementById('log-line-indicator').textContent = '';
            fullLogBuffer = '';
            lastLogOffset = 0;
            currentSelectedStage = null;
            currentSectionLines = [];
            renderedLineCount = 0;

            if (logPollingInterval) clearInterval(logPollingInterval);

            logModal.show();

            // Attach scroll listener for lazy loading
            const modalBody = document.querySelector('#logModal .modal-body');
            modalBody.onscroll = () => {
                if (modalBody.scrollHeight - modalBody.scrollTop - modalBody.clientHeight < 150) {
                    loadMoreLogLines();
                }
            };

            const logElement = document.getElementById('logModal');
            logElement.addEventListener('hidden.bs.modal', () => {
                if (logPollingInterval) {
                    clearInterval(logPollingInterval);
                    logPollingInterval = null;
                }
                modalBody.onscroll = null;
            }, { once: true });

            pollLogs(jobId);
            logPollingInterval = setInterval(() => pollLogs(jobId), 2000);
        }

        async function pollLogs(jobId) {
            try {
                const resp = await fetch(`/api/jobs/${jobId}/logs?offset=${lastLogOffset}`);
                const data = await resp.json();

                if (data.logs) {
                    fullLogBuffer += data.logs;
                    lastLogOffset = data.offset;

                    const sections = parseLogSections(fullLogBuffer);

                    // Auto-select first section on first load
                    if (!currentSelectedStage && sections.length > 0) {
                        // Find the last non-empty running stage, or just pick the last section
                        currentSelectedStage = sections[sections.length - 1].id;
                    }

                    renderLogStageGrid(sections);

                    // Check if user is at bottom BEFORE updating content
                    const shouldAutoScroll = isUserAtBottom();

                    // Update displayed content using lazy rendering
                    const content = getStageContent(currentSelectedStage, sections);
                    renderLogContent(content, false);

                    // Only auto-scroll if user was already at the bottom
                    if (shouldAutoScroll) {
                        const modalBody = document.querySelector('#logModal .modal-body');
                        modalBody.scrollTop = modalBody.scrollHeight;
                    }
                } else if (lastLogOffset === 0) {
                    document.getElementById('log-content').textContent = 'Waiting for logs...';
                }
            } catch (err) {
                console.error("Log polling error", err);
            }
        }

        // Initialize
        loadProjects();
    </script>
</body>
</html>
