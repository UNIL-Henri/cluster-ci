<!DOCTYPE html>
<html>
<head>
    <title>Cluster-CI Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .explorer-item {
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            height: 100%;
        }
        .explorer-item:hover {
            background-color: #e9ecef;
        }
        .explorer-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .folder-icon { color: #ffca28; }
        .file-icon { color: #90a4ae; }
        .breadcrumb-item { cursor: pointer; color: #0d6efd; }
        .breadcrumb-item.active { cursor: default; color: #6c757d; }
        .status-badge {
            font-size: 0.8rem;
            padding: 0.3em 0.6em;
            border-radius: 10px;
        }
        #preview-content img {
            max-width: 100%;
            height: auto;
        }
        #preview-content pre {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            max-height: 500px;
            overflow-y: auto;
        }
        .table-preview {
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Cluster-CI</a>
            <div class="navbar-text text-light">
                Logged in as <strong>{{ user.login }}</strong>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm ms-3">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-white p-3 rounded shadow-sm" id="breadcrumb">
                <li class="breadcrumb-item active" id="breadcrumb-home" onclick="navigateToRoot()">Home</li>
            </ol>
        </nav>

        <div id="explorer-container" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Content will be loaded here via JS -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="previewModalLabel">File Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="preview-loading" class="text-center py-5 d-none">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="preview-content"></div>
                </div>
                <div class="modal-footer">
                    <a id="preview-download-btn" href="#" class="btn btn-primary" target="_blank">Download</a>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));
        const previewContent = document.getElementById('preview-content');
        const previewLoading = document.getElementById('preview-loading');
        const previewLabel = document.getElementById('previewModalLabel');
        const previewDownloadBtn = document.getElementById('preview-download-btn');

        const MAX_PREVIEW_SIZE = 10 * 1024 * 1024; // 10MB

        async function previewFile(url, path, size) {
            previewLabel.textContent = `Preview: ${path}`;
            previewDownloadBtn.href = url;
            previewContent.innerHTML = '';

            const ext = path.split('.').pop().toLowerCase();
            const isImage = ['png', 'jpg', 'jpeg', 'svg', 'webp'].includes(ext);
            const isCSV = ext === 'csv';
            const isText = ['json', 'yaml', 'yml', 'txt', 'log', 'md'].includes(ext);

            if (!isImage && !isCSV && !isText) {
                previewContent.innerHTML = `<div class="alert alert-warning">Preview not supported for this file type (.${ext}). Please download the file to view it.</div>`;
                previewModal.show();
                return;
            }

            if (size > MAX_PREVIEW_SIZE) {
                previewContent.innerHTML = `<div class="alert alert-warning">File is too large to preview (${(size / (1024 * 1024)).toFixed(1)} MB). Please download the file to view it.</div>`;
                previewModal.show();
                return;
            }

            previewLoading.classList.remove('d-none');
            previewModal.show();

            try {
                if (isImage) {
                    previewContent.innerHTML = `<div class="text-center"><img src="${url}" alt="${path}"></div>`;
                } else if (isCSV) {
                    const resp = await fetch(url);
                    const text = await resp.text();
                    renderCSV(text);
                } else if (isText) {
                    const resp = await fetch(url);
                    const text = await resp.text();
                    previewContent.innerHTML = `<pre><code>${escapeHtml(text)}</code></pre>`;
                }
            } catch (err) {
                previewContent.innerHTML = `<div class="alert alert-danger">Error loading preview: ${err.message}</div>`;
            } finally {
                previewLoading.classList.add('d-none');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderCSV(text) {
            const rows = text.split('\n').filter(r => r.trim()).slice(0, 101); // Limit to 100 rows
            if (rows.length === 0) {
                previewContent.innerHTML = '<div class="alert alert-info">CSV file is empty.</div>';
                return;
            }

            let html = '<div class="table-responsive"><table class="table table-sm table-bordered table-striped table-preview"><thead><tr>';
            const headers = rows[0].split(',');
            headers.forEach(h => {
                html += `<th>${escapeHtml(h)}</th>`;
            });
            html += '</tr></thead><tbody>';

            for (let i = 1; i < rows.length; i++) {
                html += '<tr>';
                const cells = rows[i].split(',');
                cells.forEach(c => {
                    html += `<td>${escapeHtml(c)}</td>`;
                });
                html += '</tr>';
            }

            html += '</tbody></table></div>';
            if (text.split('\n').length > 101) {
                html += '<div class="text-muted small mt-2 text-center">Showing first 100 rows. Download the file for full content.</div>';
            }
            previewContent.innerHTML = html;
        }

        const container = document.getElementById('explorer-container');
        const breadcrumb = document.getElementById('breadcrumb');

        let currentState = {
            view: 'root', // root, project, run
            repo: null,
            jobId: null,
            branch: null,
            commitHash: null
        };

        function updateBreadcrumb() {
            breadcrumb.innerHTML = '<li class="breadcrumb-item ' + (currentState.view === 'root' ? 'active' : '') + '" onclick="navigateToRoot()">Home</li>';

            if (currentState.repo) {
                breadcrumb.innerHTML += '<li class="breadcrumb-item ' + (currentState.view === 'project' ? 'active' : '') + '" onclick="navigateToProject(\'' + currentState.repo + '\')">' + currentState.repo + '</li>';
            }

            if (currentState.jobId) {
                breadcrumb.innerHTML += '<li class="breadcrumb-item active">' + currentState.jobId.substring(0, 8) + '...</li>';
            }
        }

        async function loadProjects() {
            currentState = { view: 'root', repo: null, jobId: null };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';

            try {
                const resp = await fetch('/api/projects');
                if (!resp.ok) {
                    const contentType = resp.headers.get('content-type');
                    const error = (contentType && contentType.includes('application/json')) ? (await resp.json()).error : 'Internal Server Error';
                    throw new Error(error || 'Failed to load projects');
                }
                const projects = await resp.json();

                if (projects.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">No projects found.</div></div>';
                    return;
                }

                container.innerHTML = '';
                projects.forEach(repo => {
                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = `
                        <div class="card h-100 explorer-item shadow-sm" onclick="navigateToProject('${repo}')">
                            <i class="bi bi-folder-fill explorer-icon folder-icon"></i>
                            <h6 class="card-title text-truncate" title="${repo}">${repo}</h6>
                        </div>
                    `;
                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading projects: ${err.message}</div></div>`;
            }
        }

        async function loadRuns(repo) {
            currentState = { view: 'project', repo: repo, jobId: null };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';

            try {
                const resp = await fetch(`/api/projects/${repo}/runs`);
                if (!resp.ok) {
                    const contentType = resp.headers.get('content-type');
                    const error = (contentType && contentType.includes('application/json')) ? (await resp.json()).error : 'Internal Server Error';
                    throw new Error(error || 'Failed to load runs');
                }
                const runs = await resp.json();

                if (runs.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">No runs found for this project.</div></div>';
                    return;
                }

                container.innerHTML = '';
                runs.forEach(run => {
                    const statusClass = run.status === 'completed' ? 'text-success' : (run.status === 'running' ? 'text-primary' : 'text-danger');
                    const statusIcon = run.status === 'completed' ? 'bi-check-circle-fill' : (run.status === 'running' ? 'bi-play-circle-fill' : 'bi-exclamation-circle-fill');

                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = `
                        <div class="card h-100 explorer-item shadow-sm" onclick="navigateToRun('${run.job_id}', '${run.status}', '${repo}', '${run.branch}', '${run.commit_hash}')">
                            <i class="bi bi-folder-fill explorer-icon folder-icon"></i>
                            <h6 class="card-title mb-1">${run.job_id.substring(0, 8)}...</h6>
                            <div class="${statusClass} mb-2">
                                <i class="bi ${statusIcon}"></i> ${run.status}
                            </div>
                            <small class="text-muted">${new Date(run.created_at).toLocaleString()}</small>
                        </div>
                    `;
                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading runs: ${err.message}</div></div>`;
            }
        }

        function navigateToRoot() {
            loadProjects();
        }

        async function loadRunDetails(jobId, status, repo, branch, commitHash) {
            currentState = { view: 'run', repo: repo, jobId: jobId, branch: branch, commitHash: commitHash };
            updateBreadcrumb();
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';

            if (status === 'running') {
                const [owner, name] = repo.split('/');
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="card shadow-sm p-5">
                            <h3>Run is currently in progress</h3>
                            <p class="text-muted">Files are being processed and are not yet pushed to the headnode.</p>
                            <a href="/view/${owner}/${name}/" class="btn btn-primary btn-lg mt-3">
                                <i class="bi bi-broadcast"></i> Open Live DVC-Viewer
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            try {
                const resp = await fetch(`/api/runs/${jobId}/files`);
                if (!resp.ok) {
                    const contentType = resp.headers.get('content-type');
                    const error = (contentType && contentType.includes('application/json')) ? (await resp.json()).error : 'Internal Server Error';
                    throw new Error(error || 'Failed to load files');
                }
                const files = await resp.json();

                if (files.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">No files found for this run.</div></div>';
                    return;
                }

                container.innerHTML = '';
                // Render files/dirs
                files.forEach(item => {
                    const col = document.createElement('div');
                    col.className = 'col';

                    // IMPROVED Folder detection:
                    // In DVC list --json:
                    // - Directories often have a trailing slash in 'path' (e.g., 'data/')
                    // - They might have isout: true
                    // - They NEVER have a 'hash' or 'size' in the list output for their own entry
                    const isDir = item.path.endsWith('/') || (!item.hash && !item.size);
                    const icon = isDir ? 'bi-folder-fill folder-icon' : 'bi-file-earmark-text-fill file-icon';

                    // Construct download link using commit hash if available for consistency
                    const [owner, name] = repo.split('/');
                    const rev = currentState.commitHash || currentState.branch || 'main';
                    const downloadUrl = `/artifacts/${owner}/${name}/${rev}/${encodeURIComponent(item.path)}`;

                    col.innerHTML = `
                        <div class="card h-100 explorer-item shadow-sm" onclick="${isDir ? '' : `previewFile('${downloadUrl}', '${item.path.replace(/'/g, "\\'")}', ${item.size || 0})`}">
                            <i class="bi ${icon} explorer-icon"></i>
                            <h6 class="card-title text-truncate" title="${item.path}">${item.path}</h6>
                            <small class="text-muted">${item.size ? (item.size / 1024).toFixed(1) + ' KB' : (isDir ? 'Directory' : 'Tracked File')}</small>
                        </div>
                    `;
                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error loading run details: ${err.message}</div></div>`;
            }
        }

        function navigateToProject(repo) {
            loadRuns(repo);
        }

        function navigateToRun(jobId, status, repo, branch, commitHash) {
            loadRunDetails(jobId, status, repo, branch, commitHash);
        }

        // Initialize
        loadProjects();
    </script>
</body>
</html>
